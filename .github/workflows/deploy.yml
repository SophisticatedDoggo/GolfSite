name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate db.php
        run: |
          cat > db.php << 'EOF'
          <?php
          $servername = "${{ secrets.DB_HOST }}";
          $username = "${{ secrets.DB_USERNAME }}";
          $password = "${{ secrets.DB_PASSWORD }}";
          $dbname = "${{ secrets.DB_NAME }}";

          //Create connection
          $conn = new mysqli($servername, $username, $password, $dbname);

          //Check Connection
          if ($conn->connect_error) {
              die("Connection failed: " . $conn->connect_error);
          }
          EOF

      - name: Generate config.php
        run: |
          cat > config.php << 'EOF'
          <?php
          define('MAIL_USERNAME', '${{ secrets.MAIL_USERNAME }}');
          define('MAIL_PASSWORD', '${{ secrets.MAIL_PASSWORD }}');
          define('MAIL_TO', '${{ secrets.MAIL_TO }}');
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /smithsgrips.golf/htdocs/
          local-dir: ./